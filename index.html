<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DISTANTS — Welcome Home</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f5f7f6;
      color: #2f3e3a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 700px;
      padding: 40px;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      line-height: 1.6;
    }
    .soft {
      margin-top: 30px;
      font-style: italic;
      color: #6b7d78;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome Home</h1>
    <p>
      You’ve arrived at DISTANTS —
      a quiet place, created with care,
      where support is offered gently,
      and understanding comes first.
    </p>
    <p>
      There is nothing required of you here.
      No pressure. No expectations.
      Only a space to begin… wherever you are.
    </p>
    <div class="soft">
      More will appear here soon.
    </div>
  </div>
</body>
</html>

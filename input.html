<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DISTANTS — Input</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(#eef6f2, #dceee6);
      color: #2f3e3a;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    textarea {
      width: 80%;
      max-width: 600px;
      height: 120px;
      padding: 15px;
      font-size: 1em;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      background: #2e4a42;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3b6157;
    }

    .response {
      margin-top: 30px;
      font-style: italic;
      color: #5a6f68;
    }
  </style>
</head>

<body>

  <h1>What would you like help with?</h1>

  <textarea placeholder="You can begin here..."></textarea><br>

  <button onclick="respond()">Continue</button>

  <div class="response" id="response"></div>

  <script>
    function respond() {
      document.getElementById("response").innerText =
        "Thank you. Your input has been received. The Companion will respond shortly.";
    }
  </script>

</body>
</html>
